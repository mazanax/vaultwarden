services:
  vaultwarden:
    build: .
    image: custom-vaultwarden:latest
    container_name: vaultwarden
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - vw-data:/data
    env_file:
      - .env
    # Backups start automatically once the required BACKUP_* vars in .env are set.

volumes:
  vw-data:
