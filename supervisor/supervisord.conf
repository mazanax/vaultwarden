[supervisord]
nodaemon=true
user=root
logfile=/dev/null
logfile_maxbytes=0
pidfile=/run/supervisord.pid

# Vaultwarden itself. We reuse the base image's /start.sh which performs the
# usual setup and then execs the vaultwarden binary. Its stdout/stderr are
# routed to the container's stdout/stderr so logs show up in `kubectl logs`.
[program:vaultwarden]
command=/start.sh
autostart=true
autorestart=true
startsecs=5
priority=10
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

# cron in the foreground. Individual jobs additionally redirect their output to
# /proc/1/fd/1 (see the generated /etc/cron.d file) so backup logs reach the
# container stdout as well.
[program:cron]
command=/usr/sbin/cron -f -L 2
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
